# Firebase App Hosting configuration.
# Docs: https://firebase.google.com/docs/app-hosting/configure

runConfig:
  minInstances: 0
  maxInstances: 3
  concurrency: 80
  cpu: 1
  memoryMiB: 1024

# Environment variables exposed to the running server (SSR + API routes).
# Secrets should use Cloud Secret Manager via `secret:` instead of `value:`.
env:
  - variable: GOOGLE_CLOUD_PROJECT
    value: dharma-501312
    availability:
      - RUNTIME

  # Cloud Storage bucket for uploaded LMS media. Defaults to the project's
  # Firebase Storage bucket.
  - variable: LMS_MEDIA_BUCKET
    value: dharma-501312.firebasestorage.app
    availability:
      - RUNTIME

  # --- Firebase web config (public). NEXT_PUBLIC_* must be available at BUILD
  # so Next.js can inline them into the client bundle. ---
  - variable: NEXT_PUBLIC_FIREBASE_API_KEY
    value: AIzaSyBGYgty62tkFrkHqZ5kAzulMNGBnNchjg4
    availability:
      - BUILD

  - variable: NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN
    value: dharma-501312.firebaseapp.com
    availability:
      - BUILD

  - variable: NEXT_PUBLIC_FIREBASE_PROJECT_ID
    value: dharma-501312
    availability:
      - BUILD

  - variable: NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET
    value: dharma-501312.firebasestorage.app
    availability:
      - BUILD

  - variable: NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID
    value: "267769847144"
    availability:
      - BUILD

  - variable: NEXT_PUBLIC_FIREBASE_APP_ID
    value: "1:267769847144:web:cc6e8dc55b0fdbc283cadd"
    availability:
      - BUILD

  - variable: NEXT_PUBLIC_FIREBASE_MEASUREMENT_ID
    value: G-BTFN0P7E6N
    availability:
      - BUILD
